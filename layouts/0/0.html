<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Layout Preview</title>
<style>
  :root {
    --page-bg: #f5f0e6;
    --text: #2f261c;
    --muted: #776a58;
    --empty: #efe4d2;
    --station: #2f8f63;
    --shelf: #a46a2a;
    --grid-line: #ddcdb2;
    --cell-size: 24px;
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    min-height: 100vh;
    padding: 24px;
    background:
      radial-gradient(circle at top left, rgba(255, 255, 255, 0.7), transparent 32%),
      linear-gradient(135deg, #ede4d2 0%, #f8f3e8 48%, #e6d8bd 100%);
    color: var(--text);
    font-family: "Trebuchet MS", "Segoe UI", sans-serif;
  }

  .meta {
    margin-bottom: 14px;
    font-size: 0.95rem;
    font-weight: 600;
    letter-spacing: 0.03em;
    color: var(--muted);
  }

  .grid {
    display: grid;
    gap: 2px;
    width: max-content;
    background: var(--grid-line);
    padding: 2px;
    border-radius: 6px;
  }

  .cell {
    width: var(--cell-size);
    height: var(--cell-size);
    border-radius: 4px;
    background: var(--empty);
  }

  .cell:hover {
    outline: 2px solid rgba(47, 38, 28, 0.35);
    outline-offset: -2px;
  }

  .cell.station {
    background: linear-gradient(135deg, #39a272, var(--station));
  }

  .cell.shelf {
    background: linear-gradient(135deg, #bf8643, var(--shelf));
  }

  @media (max-width: 640px) {
    body {
      padding: 16px;
    }

    :root {
      --cell-size: 20px;
    }
  }
</style>
</head>
<body>
<p class="meta" id="meta"></p>
<div class="grid" id="grid" aria-label="Siatka magazynu"></div>

<script>
const metaElement = document.getElementById("meta");
const gridElement = document.getElementById("grid");
const layout = {
  width: 30,
  height: 14,
  stations: [
    { from: [2, 2], to: [3, 11] }
  ],
  shelves: [
    { from: [6, 2], to: [15, 3] },
    { from: [18, 2], to: [27, 3] },
    { from: [6, 6], to: [15, 7] },
    { from: [18, 6], to: [27, 7] },
    { from: [6, 10], to: [15, 11] },
    { from: [18, 10], to: [27, 11] }
  ]
};

function isPointInside(area, x, y) {
  const [fromX, fromY] = area.from;
  const [toX, toY] = area.to;
  return x >= fromX && x <= toX && y >= fromY && y <= toY;
}

function validateAreas(areas, width, height, label) {
  if (!Array.isArray(areas)) {
    throw new Error(label + " must be an array.");
  }

  areas.forEach((area, index) => {
    if (!Array.isArray(area.from) || !Array.isArray(area.to) || area.from.length !== 2 || area.to.length !== 2) {
      throw new Error(label + " area " + index + " must contain from/to coordinate pairs.");
    }

    const [fromX, fromY] = area.from;
    const [toX, toY] = area.to;
    const insideBounds =
      Number.isInteger(fromX) &&
      Number.isInteger(fromY) &&
      Number.isInteger(toX) &&
      Number.isInteger(toY) &&
      fromX >= 0 &&
      fromY >= 0 &&
      toX < width &&
      toY < height &&
      fromX <= toX &&
      fromY <= toY;

    if (!insideBounds) {
      throw new Error(label + " area " + index + " is outside layout bounds.");
    }
  });
}

function validateLayout(layout) {
  if (!layout || !Number.isInteger(layout.width) || !Number.isInteger(layout.height)) {
    throw new Error("Layout must define integer width and height.");
  }

  if (layout.width <= 0 || layout.height <= 0) {
    throw new Error("Layout width and height must be positive.");
  }

  validateAreas(layout.stations, layout.width, layout.height, "stations");
  validateAreas(layout.shelves, layout.width, layout.height, "shelves");
}

function cellType(layout, x, y) {
  if (layout.stations.some((area) => isPointInside(area, x, y))) {
    return "station";
  }

  if (layout.shelves.some((area) => isPointInside(area, x, y))) {
    return "shelf";
  }

  return "empty";
}

function renderMeta(layout) {
  metaElement.textContent =
    "Szerokosc: " + layout.width +
    " | Wysokosc: " + layout.height +
    " | Stacje: " + layout.stations.length +
    " | Polki: " + layout.shelves.length;
}

function renderGrid(layout) {
  gridElement.innerHTML = "";
  gridElement.style.gridTemplateColumns = "repeat(" + layout.width + ", var(--cell-size))";

  for (let y = 0; y < layout.height; y += 1) {
    for (let x = 0; x < layout.width; x += 1) {
      const cell = document.createElement("div");
      const type = cellType(layout, x, y);

      cell.className = "cell" + (type === "empty" ? "" : " " + type);
      cell.title = "x: " + x + ", y: " + y;
      cell.setAttribute("aria-label", "Komorka x: " + x + ", y: " + y);
      gridElement.appendChild(cell);
    }
  }
}

function initializeLayout() {
  try {
    validateLayout(layout);
    renderMeta(layout);
    renderGrid(layout);
    document.title = "0 layout";
  } catch (error) {
    metaElement.textContent = "Blad: nie udalo sie zainicjalizowac layoutu.";
    console.error(error);
  }
}

initializeLayout();
</script>
</body>
</html>
