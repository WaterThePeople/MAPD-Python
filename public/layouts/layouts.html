<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Layouts Preview</title>
    <style>
      :root {
        --page-bg: #f5f0e6;
        --panel-bg: rgba(255, 252, 245, 0.88);
        --panel-border: rgba(119, 106, 88, 0.18);
        --text: #2f261c;
        --muted: #776a58;
        --empty: #efe4d2;
        --station: #2f8f63;
        --delivery: #3a7f9bfa;
        --shelf: #a46a2a;
        --grid-line: #ddcdb2;
        --gap: 3px;
        --square-size: 24px;
        --hex-width: 28px;
        --triangle-side: 28px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        padding: 24px;
        background:
          radial-gradient(
            circle at top left,
            rgba(255, 255, 255, 0.7),
            transparent 32%
          ),
          linear-gradient(135deg, #ede4d2 0%, #f8f3e8 48%, #e6d8bd 100%);
        color: var(--text);
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      }

      .shell {
        display: grid;
        gap: 18px;
        min-height: calc(100vh - 48px);
        grid-template-rows: auto auto minmax(0, 1fr) auto;
        align-content: start;
      }

      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        align-items: end;
        padding: 14px 16px;
        border: 1px solid var(--panel-border);
        border-radius: 14px;
        background: var(--panel-bg);
        backdrop-filter: blur(10px);
        box-shadow: 0 14px 28px rgba(47, 38, 28, 0.08);
      }

      .field {
        display: grid;
        gap: 6px;
        min-width: 180px;
      }

      .field label {
        font-size: 0.84rem;
        font-weight: 700;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: var(--muted);
      }

      .field select {
        height: 40px;
        padding: 0 12px;
        border: 1px solid rgba(119, 106, 88, 0.28);
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.94);
        color: var(--text);
        font: inherit;
      }

      .meta {
        min-height: 22px;
        font-size: 0.95rem;
        font-weight: 600;
        letter-spacing: 0.03em;
        color: var(--muted);
      }

      .preview {
        min-width: 0;
        min-height: 0;
        padding: 18px;
        border: 1px solid var(--panel-border);
        border-radius: 18px;
        background: var(--panel-bg);
        backdrop-filter: blur(10px);
        box-shadow: 0 14px 28px rgba(47, 38, 28, 0.08);
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .board-shell {
        position: relative;
        flex: 0 0 auto;
      }

      .board {
        width: max-content;
        transform-origin: top left;
      }

      .board.square {
        display: grid;
        gap: var(--gap);
        background: var(--grid-line);
        padding: var(--gap);
        border-radius: 6px;
      }

      .board.hexagon {
        position: relative;
      }

      .board.triangle {
        position: relative;
      }

      .cell {
        background: var(--empty);
      }

      .cell.square {
        width: var(--square-size);
        height: var(--square-size);
        border-radius: 4px;
      }

      .cell.square:hover {
        outline: 2px solid rgba(47, 38, 28, 0.35);
        outline-offset: -2px;
      }

      .cell.hexagon {
        position: absolute;
        width: var(--hex-width);
        aspect-ratio: 0.8660254;
        clip-path: polygon(
          50% 0%,
          93.3% 25%,
          93.3% 75%,
          50% 100%,
          6.7% 75%,
          6.7% 25%
        );
        border: 1px solid rgba(119, 106, 88, 0.35);
      }

      .cell.hexagon:hover {
        filter: brightness(1.04) drop-shadow(0 0 4px rgba(47, 38, 28, 0.22));
      }

      .cell.triangle {
        position: absolute;
        width: var(--triangle-side);
        height: calc(var(--triangle-side) * 0.8660254);
        border: 1px solid rgba(119, 106, 88, 0.35);
      }

      .cell.triangle.up {
        clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
      }

      .cell.triangle.down {
        clip-path: polygon(0% 0%, 100% 0%, 50% 100%);
      }

      .cell.triangle:hover {
        filter: brightness(1.04) drop-shadow(0 0 4px rgba(47, 38, 28, 0.22));
      }

      .cell.station {
        background: linear-gradient(135deg, #39a272, var(--station));
      }

      .cell.delivery {
        background: linear-gradient(135deg, #3a7f9bfa, var(--delivery));
      }

      .cell.shelf {
        background: linear-gradient(135deg, #bf8643, var(--shelf));
      }

      .hint {
        min-height: 22px;
        max-width: 820px;
        font-size: 0.9rem;
        line-height: 1.5;
        color: var(--muted);
      }

      @media (max-width: 640px) {
        body {
          padding: 16px;
        }

        .shell {
          min-height: calc(100vh - 32px);
        }

        .controls {
          width: 100%;
        }

        .field {
          min-width: 0;
          width: 100%;
        }

        :root {
          --square-size: 20px;
          --hex-width: 24px;
          --triangle-side: 24px;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <div class="controls">
        <div class="field">
          <label for="size-select">Rozmiar</label>
          <select id="size-select"></select>
        </div>
        <div class="field">
          <label for="layout-select">Layout</label>
          <select id="layout-select"></select>
        </div>
        <div class="field">
          <label for="type-select">Typ Pol</label>
          <select id="type-select"></select>
        </div>
      </div>

      <p class="meta" id="meta"></p>
      <div class="preview" id="preview">
        <div class="board-shell" id="board-shell">
          <div
            class="board"
            id="board"
            aria-label="Podglad layoutu magazynu"
          ></div>
        </div>
      </div>
      <p class="hint" id="hint"></p>
    </div>

    <script>
      const AVAILABLE_SIZES = [
        { value: "small", label: "Small" },
        { value: "medium", label: "Medium" },
        { value: "large", label: "Large" },
      ];
      const AVAILABLE_LAYOUTS_BY_SIZE = {
        small: ["0", "1", "2", "3", "4", "5", "6", "7"],
        medium: ["0", "1", "2", "3", "4", "5", "6", "7"],
        large: ["0", "1", "2", "3", "4", "5", "6", "7"],
      };
      const SUPPORTED_SIZES = new Set(
        AVAILABLE_SIZES.map((item) => item.value),
      );
      const AVAILABLE_TYPES = [
        { value: "square", label: "Kwadratowe" },
        { value: "hexagon", label: "Szesciokatne" },
        { value: "triangle", label: "Trojkatne" },
      ];
      const SUPPORTED_TYPES = new Set(
        AVAILABLE_TYPES.map((item) => item.value),
      );
      const layoutCache = new Map();

      const sizeSelect = document.getElementById("size-select");
      const layoutSelect = document.getElementById("layout-select");
      const typeSelect = document.getElementById("type-select");
      const metaElement = document.getElementById("meta");
      const previewElement = document.getElementById("preview");
      const boardShellElement = document.getElementById("board-shell");
      const boardElement = document.getElementById("board");
      const hintElement = document.getElementById("hint");

      initializeControls();
      renderSelectedLayout();

      sizeSelect.addEventListener("change", handleSizeChange);
      layoutSelect.addEventListener("change", renderSelectedLayout);
      typeSelect.addEventListener("change", renderSelectedLayout);
      window.addEventListener("resize", fitBoardToViewport);

      function initializeControls() {
        for (const sizeOption of AVAILABLE_SIZES) {
          const option = document.createElement("option");
          option.value = sizeOption.value;
          option.textContent = sizeOption.label;
          sizeSelect.appendChild(option);
        }

        for (const typeOption of AVAILABLE_TYPES) {
          const option = document.createElement("option");
          option.value = typeOption.value;
          option.textContent = typeOption.label;
          typeSelect.appendChild(option);
        }

        const searchParams = new URLSearchParams(window.location.search);
        const requestedSize = searchParams.get("size");
        const requestedLayout = searchParams.get("layout");
        const requestedType = searchParams.get("type");

        sizeSelect.value = SUPPORTED_SIZES.has(requestedSize)
          ? requestedSize
          : AVAILABLE_SIZES[0].value;
        syncLayoutOptions(requestedLayout);
        typeSelect.value = SUPPORTED_TYPES.has(requestedType)
          ? requestedType
          : AVAILABLE_TYPES[0].value;
      }

      function handleSizeChange() {
        syncLayoutOptions(layoutSelect.value);
        renderSelectedLayout();
      }

      function getAvailableLayoutsForSelectedSize() {
        return AVAILABLE_LAYOUTS_BY_SIZE[sizeSelect.value] || [];
      }

      function syncLayoutOptions(preferredLayoutId) {
        const availableLayouts = getAvailableLayoutsForSelectedSize();
        layoutSelect.innerHTML = "";

        for (const layoutId of availableLayouts) {
          const option = document.createElement("option");
          option.value = layoutId;
          option.textContent = "Layout " + layoutId;
          layoutSelect.appendChild(option);
        }

        layoutSelect.value = availableLayouts.includes(preferredLayoutId)
          ? preferredLayoutId
          : availableLayouts[0] || "";
      }

      function formatSizeLabel(layoutSize) {
        return layoutSize.charAt(0).toUpperCase() + layoutSize.slice(1);
      }

      async function renderSelectedLayout() {
        const layoutSize = sizeSelect.value;
        const layoutId = layoutSelect.value;
        const layoutType = typeSelect.value;

        try {
          if (!layoutId) {
            throw new Error("Brak dostepnych layoutow dla wybranego rozmiaru.");
          }

          updateUrl(layoutSize, layoutId, layoutType);
          const rawLayout = await loadLayoutJson(layoutSize, layoutId);
          const layout = buildLayout(rawLayout, layoutType);
          validateLayout(layout);
          renderMeta(layoutSize, layoutId, layout);
          renderBoard(layout);
          fitBoardToViewport();
          document.title =
            "Layout " +
            layoutId +
            " - " +
            formatSizeLabel(layoutSize) +
            " - " +
            layoutType;
        } catch (error) {
          boardElement.innerHTML = "";
          boardElement.className = "board";
          boardElement.style.width = "";
          boardElement.style.height = "";
          boardElement.style.transform = "";
          boardShellElement.style.width = "";
          boardShellElement.style.height = "";
          metaElement.textContent = "Blad: nie udalo sie zaladowac layoutu.";
          hintElement.textContent = String(error);
          console.error(error);
        }
      }

      function updateUrl(layoutSize, layoutId, layoutType) {
        const searchParams = new URLSearchParams(window.location.search);
        searchParams.set("size", layoutSize);
        searchParams.set("layout", layoutId);
        searchParams.set("type", layoutType);
        const nextUrl =
          window.location.pathname + "?" + searchParams.toString();
        window.history.replaceState({}, "", nextUrl);
      }

      async function loadLayoutJson(layoutSize, layoutId) {
        const cacheKey = layoutSize + ":" + layoutId;
        if (layoutCache.has(cacheKey)) {
          return layoutCache.get(cacheKey);
        }

        const relativePath = layoutSize + "/" + layoutId + ".json";
        const response = await fetch(relativePath, { cache: "no-store" });
        if (!response.ok) {
          throw new Error(
            "Nie udalo sie wczytac pliku layouts/" + relativePath,
          );
        }

        const rawLayout = await response.json();
        layoutCache.set(cacheKey, rawLayout);
        return rawLayout;
      }

      function buildLayout(rawLayout, layoutType) {
        return {
          width: rawLayout.width,
          height: rawLayout.height,
          stations: rawLayout.stations,
          delivery: rawLayout.delivery,
          shelves: rawLayout.shelves,
          type: layoutType,
        };
      }

      function isPointInside(area, x, y) {
        const [fromX, fromY] = area.from;
        const [toX, toY] = area.to;
        return x >= fromX && x <= toX && y >= fromY && y <= toY;
      }

      function validateAreas(areas, width, height, label) {
        if (!Array.isArray(areas)) {
          throw new Error(label + " must be an array.");
        }

        areas.forEach((area, index) => {
          if (
            !Array.isArray(area.from) ||
            !Array.isArray(area.to) ||
            area.from.length !== 2 ||
            area.to.length !== 2
          ) {
            throw new Error(
              label +
                " area " +
                index +
                " must contain from/to coordinate pairs.",
            );
          }

          const [fromX, fromY] = area.from;
          const [toX, toY] = area.to;
          const insideBounds =
            Number.isInteger(fromX) &&
            Number.isInteger(fromY) &&
            Number.isInteger(toX) &&
            Number.isInteger(toY) &&
            fromX >= 0 &&
            fromY >= 0 &&
            toX < width &&
            toY < height &&
            fromX <= toX &&
            fromY <= toY;

          if (!insideBounds) {
            throw new Error(
              label + " area " + index + " is outside layout bounds.",
            );
          }
        });
      }

      function validateLayout(layout) {
        if (
          !layout ||
          !Number.isInteger(layout.width) ||
          !Number.isInteger(layout.height)
        ) {
          throw new Error("Layout must define integer width and height.");
        }

        if (
          typeof layout.type !== "string" ||
          !SUPPORTED_TYPES.has(layout.type)
        ) {
          throw new Error(
            "Layout must define supported type: square, hexagon or triangle.",
          );
        }

        if (layout.width <= 0 || layout.height <= 0) {
          throw new Error("Layout width and height must be positive.");
        }

        validateAreas(layout.stations, layout.width, layout.height, "stations");
        validateAreas(layout.delivery, layout.width, layout.height, "delivery");
        validateAreas(layout.shelves, layout.width, layout.height, "shelves");
      }

      function cellType(layout, x, y) {
        if (layout.stations.some((area) => isPointInside(area, x, y))) {
          return "station";
        }

        if (layout.delivery.some((area) => isPointInside(area, x, y))) {
          return "delivery";
        }

        if (layout.shelves.some((area) => isPointInside(area, x, y))) {
          return "shelf";
        }

        return "empty";
      }

      function areaCellCount(areas) {
        return areas.reduce((total, area) => {
          const width = area.to[0] - area.from[0] + 1;
          const height = area.to[1] - area.from[1] + 1;
          return total + width * height;
        }, 0);
      }

      function renderMeta(layoutSize, layoutId, layout) {
        const stationCells = areaCellCount(layout.stations);
        const deliveryCells = areaCellCount(layout.delivery);
        const shelfCells = areaCellCount(layout.shelves);
        metaElement.textContent =
          "Layout: " +
          layoutId +
          " | Rozmiar: " +
          formatSizeLabel(layoutSize) +
          " | Szerokosc: " +
          layout.width +
          " | Wysokosc: " +
          layout.height +
          " | Typ: " +
          layout.type +
          " | Stacje: " +
          stationCells +
          " | Punkty dostarczenia: " +
          deliveryCells +
          " | Polki: " +
          shelfCells;
      }

      function createCell(layout, x, y, shape) {
        const cell = document.createElement("div");
        const type = cellType(layout, x, y);
        cell.className = "cell " + shape + (type === "empty" ? "" : " " + type);
        cell.title = "x: " + x + ", y: " + y;
        cell.setAttribute("aria-label", "Komorka x: " + x + ", y: " + y);
        return cell;
      }

      function renderSquareBoard(layout) {
        boardElement.innerHTML = "";
        boardElement.className = "board square";
        boardElement.style.width = "";
        boardElement.style.height = "";
        boardElement.style.gridTemplateColumns =
          "repeat(" + layout.width + ", var(--square-size))";

        for (let y = 0; y < layout.height; y += 1) {
          for (let x = 0; x < layout.width; x += 1) {
            boardElement.appendChild(createCell(layout, x, y, "square"));
          }
        }
      }

      function getHexMetrics() {
        const rootStyles = getComputedStyle(document.documentElement);
        const hexWidth =
          parseFloat(rootStyles.getPropertyValue("--hex-width")) || 28;
        const gap = parseFloat(rootStyles.getPropertyValue("--gap")) || 3;
        const hexHeight = hexWidth / 0.8660254;
        const stepX = hexWidth + gap;
        const stepY = hexHeight * 0.75 + gap;
        const rowOffset = stepX / 2;
        const paddingX = gap;
        const paddingY = gap;
        return {
          hexWidth,
          hexHeight,
          stepX,
          stepY,
          rowOffset,
          paddingX,
          paddingY,
        };
      }

      function renderHexagonBoard(layout) {
        boardElement.innerHTML = "";
        boardElement.className = "board hexagon";

        const metrics = getHexMetrics();
        const totalWidth =
          metrics.paddingX * 2 +
          metrics.stepX * (layout.width - 1) +
          metrics.hexWidth +
          metrics.rowOffset;
        const totalHeight =
          metrics.paddingY * 2 +
          metrics.stepY * (layout.height - 1) +
          metrics.hexHeight;
        boardElement.style.width = totalWidth + "px";
        boardElement.style.height = totalHeight + "px";

        for (let y = 0; y < layout.height; y += 1) {
          for (let x = 0; x < layout.width; x += 1) {
            const cell = createCell(layout, x, y, "hexagon");
            cell.style.left =
              metrics.paddingX +
              x * metrics.stepX +
              (y % 2 === 1 ? metrics.rowOffset : 0) +
              "px";
            cell.style.top = metrics.paddingY + y * metrics.stepY + "px";
            boardElement.appendChild(cell);
          }
        }
      }

      function getTriangleMetrics() {
        const rootStyles = getComputedStyle(document.documentElement);
        const triangleSide =
          parseFloat(rootStyles.getPropertyValue("--triangle-side")) || 28;
        const triangleHeight = triangleSide * 0.8660254;
        const stepX = triangleSide / 2;
        const stepY = triangleHeight;
        const padding = 1;
        return {
          triangleSide,
          triangleHeight,
          stepX,
          stepY,
          padding,
        };
      }

      function renderTriangleBoard(layout) {
        boardElement.innerHTML = "";
        boardElement.className = "board triangle";

        const metrics = getTriangleMetrics();
        const totalWidth =
          metrics.padding * 2 +
          metrics.triangleSide +
          (layout.width - 1) * metrics.stepX;
        const totalHeight =
          metrics.padding * 2 + layout.height * metrics.triangleHeight;
        boardElement.style.width = totalWidth + "px";
        boardElement.style.height = totalHeight + "px";

        for (let y = 0; y < layout.height; y += 1) {
          for (let x = 0; x < layout.width; x += 1) {
            const orientation = (x + y) % 2 === 0 ? "up" : "down";
            const cell = createCell(layout, x, y, "triangle " + orientation);
            cell.style.left = metrics.padding + x * metrics.stepX + "px";
            cell.style.top = metrics.padding + y * metrics.stepY + "px";
            boardElement.appendChild(cell);
          }
        }
      }

      function renderBoard(layout) {
        if (layout.type === "hexagon") {
          renderHexagonBoard(layout);
          return;
        }

        if (layout.type === "triangle") {
          renderTriangleBoard(layout);
          return;
        }

        renderSquareBoard(layout);
      }

      function fitBoardToViewport() {
        if (!boardElement.childElementCount) {
          return;
        }

        boardElement.style.transform = "";
        boardShellElement.style.width = "";
        boardShellElement.style.height = "";

        const naturalWidth = boardElement.offsetWidth;
        const naturalHeight = boardElement.offsetHeight;
        if (!naturalWidth || !naturalHeight) {
          return;
        }

        const previewStyles = getComputedStyle(previewElement);
        const horizontalPadding =
          (parseFloat(previewStyles.paddingLeft) || 0) +
          (parseFloat(previewStyles.paddingRight) || 0);
        const verticalPadding =
          (parseFloat(previewStyles.paddingTop) || 0) +
          (parseFloat(previewStyles.paddingBottom) || 0);

        const availableWidth = Math.max(
          1,
          previewElement.clientWidth - horizontalPadding,
        );
        const availableHeight = Math.max(
          1,
          previewElement.clientHeight - verticalPadding,
        );
        const scale = Math.min(
          1,
          availableWidth / naturalWidth,
          availableHeight / naturalHeight,
        );

        boardElement.style.transform = "scale(" + scale + ")";
        boardShellElement.style.width =
          Math.max(1, naturalWidth * scale) + "px";
        boardShellElement.style.height =
          Math.max(1, naturalHeight * scale) + "px";
      }
    </script>
  </body>
</html>
