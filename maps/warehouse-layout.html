<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Warehouse Layout</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0e14;
    color: #c8d6e5;
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 16px;
  }

  h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: #4fc3f7;
    margin-bottom: 8px;
    text-shadow: 0 0 20px rgba(79,195,247,0.4);
  }

  .subtitle {
    font-size: 0.68rem;
    letter-spacing: 0.15em;
    color: #4a5568;
    margin-bottom: 28px;
  }

  .grid-wrapper {
    border: 1px solid #1e2d3d;
    border-radius: 4px;
    padding: 16px;
    background: #0d1117;
    box-shadow: 0 0 60px rgba(0,0,0,0.8), inset 0 0 40px rgba(0,0,0,0.4);
    overflow-x: auto;
    max-width: 100%;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(48, 1fr);
    gap: 2px;
  }

  .cell {
    width: 44px;
    height: 44px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    border-radius: 3px;
    cursor: default;
    transition: transform 0.1s, box-shadow 0.1s;
    position: relative;
    user-select: none;
  }

  .cell:hover {
    transform: scale(1.15);
    z-index: 10;
  }

  .cell .num {
    font-size: 0.45rem;
    opacity: 0.55;
    line-height: 1;
    margin-bottom: 2px;
  }

  .cell .letter {
    font-size: 0.75rem;
    font-weight: bold;
    line-height: 1;
  }

  /* E — empty */
  .cell-E {
    background: #0f1923;
    border: 1px solid #1a2535;
    color: #2a3a4a;
  }
  .cell-E:hover { box-shadow: 0 0 8px rgba(30,80,120,0.4); }

  /* S — station */
  .cell-S {
    background: #0d2b1e;
    border: 1px solid #1a5c38;
    color: #4ade80;
    box-shadow: 0 0 6px rgba(74,222,128,0.15);
  }
  .cell-S .num { opacity: 0.7; color: #86efac; }
  .cell-S:hover { box-shadow: 0 0 14px rgba(74,222,128,0.5); }

  /* # — shelf */
  .cell-shelf {
    background: #1a1500;
    border: 1px solid #3d3000;
    color: #fbbf24;
    box-shadow: 0 0 4px rgba(251,191,36,0.1);
  }
  .cell-shelf .num { opacity: 0.6; color: #fcd34d; }
  .cell-shelf:hover { box-shadow: 0 0 14px rgba(251,191,36,0.45); }

  .legend {
    display: flex;
    gap: 24px;
    margin-top: 20px;
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    color: #4a5568;
  }
  .legend-item { display: flex; align-items: center; gap: 8px; }
  .legend-swatch {
    width: 14px; height: 14px; border-radius: 2px;
  }
  .swatch-E { background: #0f1923; border: 1px solid #1a2535; }
  .swatch-S { background: #0d2b1e; border: 1px solid #1a5c38; }
  .swatch-shelf { background: #1a1500; border: 1px solid #3d3000; }
</style>
</head>
<body>

<h1>Warehouse Floor Plan</h1>
<p class="subtitle">48 × 16 grid &nbsp;·&nbsp; 768 cells</p>

<div class="grid-wrapper">
  <div class="grid" id="grid"></div>
</div>

<div class="legend">
  <div class="legend-item"><div class="legend-swatch swatch-E"></div> E — Empty</div>
  <div class="legend-item"><div class="legend-swatch swatch-S"></div> S — Station</div>
  <div class="legend-item"><div class="legend-swatch swatch-shelf"></div> # — Shelf</div>
</div>

<script>
const COLS = 48;
const layout = [
  "EEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEE",
  "ESSE##########E##########E##########E##########E",
  "ESSE##########E##########E##########E##########E",
  "ESSEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEE",
  "ESSE##########E##########E##########E##########E",
  "ESSE##########E##########E##########E##########E",
  "ESSEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEE",
  "ESSE##########E##########E##########E##########E",
  "ESSE##########E##########E##########E##########E",
  "ESSEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEE",
  "ESSE##########E##########E##########E##########E",
  "ESSE##########E##########E##########E##########E",
  "ESSEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEE",
  "ESSE##########E##########E##########E##########E",
  "ESSE##########E##########E##########E##########E",
  "EEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEE",
];

const grid = document.getElementById('grid');
let cellIndex = 0;

for (let row = 0; row < layout.length; row++) {
  for (let col = 0; col < COLS; col++) {
    const ch = layout[row][col];
    const cell = document.createElement('div');
    cell.classList.add('cell');

    let label, cls;
    if (ch === 'E') { label = 'E'; cls = 'cell-E'; }
    else if (ch === 'S') { label = 'S'; cls = 'cell-S'; }
    else { label = '#'; cls = 'cell-shelf'; }

    cell.classList.add(cls);
    cell.innerHTML = `<span class="num">${cellIndex}</span><span class="letter">${label}</span>`;
    cell.title = `Cell ${cellIndex} — ${label === 'E' ? 'Empty' : label === 'S' ? 'Station' : 'Shelf'} (row ${row}, col ${col})`;
    grid.appendChild(cell);
    cellIndex++;
  }
}
</script>
</body>
</html>
